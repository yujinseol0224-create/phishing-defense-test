<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 피싱 방어력은 몇 점일까?</title>
    <!-- Tailwind CSS (디자인) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (React 문법 변환) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 폰트 설정 -->
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f0fdf4; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const questions = [
            {
                id: 1,
                tag: "AI 딥보이스",
                text: "자녀 목소리로 '엄마 나 사고 났어' 하고 울먹이는 전화가 온다면?",
                options: [
                    { text: "놀라서 일단 알려주는 계좌로 돈부터 보낸다.", score: 0 },
                    { text: "일단 전화를 끊고 자녀 본인이나 직장으로 직접 확인한다.", score: 25 }
                ]
            },
            {
                id: 2,
                tag: "기관 사칭",
                text: "'검찰청입니다. 명의가 도용됐으니 안전계좌로 이체하세요.' 전화가 온다면?",
                options: [
                    { text: "검찰이라니 무서워서 시키는 대로 이체한다.", score: 0 },
                    { text: "수사기관은 절대 전화로 돈을 요구하지 않는다는 걸 알고 끊는다.", score: 25 }
                ]
            },
            {
                id: 3,
                tag: "생활 스미싱",
                text: "'[경찰청] 교통법규 위반(신호위반) 과태료 고지서 발송 완료' 문자와 함께 링크(URL)가 온다면?",
                options: [
                    { text: "언제 신호위반을 했나 놀라서 당장 링크를 눌러 확인해 본다.", score: 0 },
                    { text: "문자 링크는 무시하고, '교통민원24' 공식 앱이나 사이트로 직접 들어간다.", score: 25 }
                ]
            },
            {
                id: 4,
                tag: "투자 리딩방",
                text: "'미국 S&P 500, 나스닥 핵심 대형주(엔비디아 등) 300% 수익 보장' 1:1 리딩방 초대 문자가 온다면?",
                options: [
                    { text: "손해 볼 건 없으니 일단 무료 정보방 링크를 눌러 입장해 본다.", score: 0 },
                    { text: "원금과 고수익을 무조건 보장하는 투자는 100% 사기라 생각하고 차단한다.", score: 25 }
                ]
            },
            {
                id: 5,
                tag: "택배 스미싱",
                text: "[국외발신] 택배 주소지 불일치로 배송이 지연되고 있습니다. 링크(URL)를 확인하세요.",
                options: [
                    { text: "궁금해서 일단 링크를 눌러본다.", score: 0 },
                    { text: "택배사 공식 앱이나 배송 조회 페이지에서 송장번호로 직접 확인한다.", score: 25 }
                ]
            },
            {
                id: 6,
                tag: "가족 사칭",
                text: "자녀에게 '엄마 나 액정 깨져서 임시 폰이야. 카톡으로 상품권 좀 사줘' 문자가 온다면?",
                options: [
                    { text: "급한가 보다 싶어서 바로 사준다.", score: 0 },
                    { text: "전화로 확인하거나 '우리 집 비상 암호'를 물어본다.", score: 25 }
                ]
            }
        ];

        function App() {
            const [step, setStep] = useState(0); 
            const [score, setScore] = useState(0);

            const handleStart = () => {
                setStep(1);
                setScore(0);
            };

            const handleAnswer = (optionScore) => {
                setScore(score + optionScore);
                setStep(step + 1);
            };

            const getResult = () => {
                // 만점 150점 기준으로 결과 세분화
                if (score === 150) return { title: "[안전] 피싱 철벽 방어자 🛡️", desc: "완벽합니다! 보이스피싱범이 울고 갈 방어력입니다. 하지만 내 가족도 나만큼 안전할까요?", color: "text-green-600", bg: "bg-green-100" };
                if (score >= 75) return { title: "[주의] 아차 하는 순간, 방심 금물 🤔", desc: "기본적인 예방 수칙은 알고 계시지만, 교묘한 최신 수법에는 아차 하는 순간 당할 수 있어요. 조금 더 신중해질 필요가 있습니다.", color: "text-yellow-600", bg: "bg-yellow-100" };
                return { title: "[위험] 귀가 얇은 팔랑귀 🚨", desc: "속임수에 넘어가기 매우 쉬운 위험 상태입니다! 지금 당장 가족과 함께 방어막을 구축해야 합니다.", color: "text-red-600", bg: "bg-red-100" };
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-xl max-w-md w-full overflow-hidden">
                        
                        {/* 시작 화면 */}
                        {step === 0 && (
                            <div className="p-8 text-center space-y-6">
                                <div className="text-5xl mb-4">📱</div>
                                <h1 className="text-2xl font-bold text-gray-800">내 피싱 방어력은<br/>과연 몇 점일까?</h1>
                                <p className="text-gray-500">1분 만에 알아보는 나의 취약점 진단<br/>(최신 수법 반영, 총 6문항)</p>
                                <button onClick={handleStart} className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition duration-200">
                                    테스트 시작하기
                                </button>
                            </div>
                        )}

                        {/* 퀴즈 화면 */}
                        {step > 0 && step <= questions.length && (
                            <div className="p-8">
                                <div className="flex justify-between items-center mb-6">
                                    <span className="text-sm font-bold text-blue-600">{questions[step-1].tag}</span>
                                    <span className="text-sm text-gray-400">{step} / {questions.length}</span>
                                </div>
                                <div className="w-full bg-gray-200 rounded-full h-2 mb-8">
                                    <div className="bg-blue-600 h-2 rounded-full transition-all duration-300" style={{ width: `${(step / questions.length) * 100}%` }}></div>
                                </div>
                                <h2 className="text-xl font-bold text-gray-800 mb-8 leading-relaxed break-keep">
                                    {questions[step-1].text}
                                </h2>
                                <div className="space-y-4">
                                    {questions[step-1].options.map((option, index) => (
                                        <button 
                                            key={index}
                                            onClick={() => handleAnswer(option.score)}
                                            className="w-full text-left p-4 rounded-xl border-2 border-gray-100 hover:border-blue-500 hover:bg-blue-50 transition duration-200 text-gray-700 break-keep"
                                        >
                                            {option.text}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* 결과 화면 */}
                        {step > questions.length && (
                            <div className="p-8">
                                <div className={`text-center p-6 rounded-xl ${getResult().bg} mb-8`}>
                                    <h2 className={`text-2xl font-bold ${getResult().color} mb-3`}>{getResult().title}</h2>
                                    <p className="text-gray-700 text-sm leading-relaxed break-keep">{getResult().desc}</p>
                                </div>

                                <div className="bg-gray-50 p-6 rounded-xl border border-gray-200 mb-6">
                                    <h3 className="font-bold text-gray-800 mb-2 flex items-center">
                                        <span className="text-xl mr-2">💡</span> 우리 집 비상 암호 만들기
                                    </h3>
                                    <p className="text-sm text-gray-600 mb-4 break-keep">
                                        AI 딥보이스 시대, 가족 목소리도 100% 믿을 수 없습니다. 돈이나 인증번호를 요구할 때 반드시 확인할 암호를 지금 가족과 정하세요!
                                    </p>
                                    <div className="bg-white p-3 rounded border border-gray-200 text-sm text-gray-700">
                                        <strong>예시 질문:</strong><br/>
                                        "우리가 처음으로 같이 간 여행지는?"<br/>
                                        "우리 집 첫째 강아지 별명은?"
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    <button onClick={() => alert('이 버튼을 누르면 동네 커뮤니티나 단톡방으로 링크가 복사되도록 설정할 수 있습니다.')} className="w-full bg-yellow-400 text-gray-800 font-bold py-3 rounded-xl hover:bg-yellow-500 transition duration-200 flex justify-center items-center">
                                        이웃과 이 테스트 공유하기
                                    </button>
                                    <button onClick={handleStart} className="w-full bg-gray-200 text-gray-700 font-bold py-3 rounded-xl hover:bg-gray-300 transition duration-200">
                                        다시 하기
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
